<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#150a0c" />
<link rel="manifest" href="manifest.webmanifest" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="RubiTrails" />
<link rel="apple-touch-icon" href="icon-180.png" />
<link rel="icon" type="image/png" sizes="32x32" href="icon-32.png" />
<title>RubiTrails</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<style>
  :root{
    --snazzberry:#6e2433;
    --snazzberry-bright:#9a3346;
    --snazzberry-deep:#3f121b;
    --trail-dust:#150a0c;
    --panel:#231115;
    --panel-2:#2c171c;
    --bone:#f2e7e9;
    --bone-dim:#c7b1b5;
    --green-blaze:#3fa15a;
    --blue-blaze:#4a8fd4;
    --hairline:rgba(242,231,233,0.10);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--trail-dust);color:var(--bone)}
  body{
    font-family:'Inter',system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
    background:
      radial-gradient(1200px 600px at 80% -10%, rgba(110,36,51,0.32), transparent 60%),
      radial-gradient(900px 500px at -10% 10%, rgba(63,18,27,0.40), transparent 55%),
      var(--trail-dust);
  }
  #root{max-width:760px;margin:0 auto;padding:0 max(16px,env(safe-area-inset-right)) calc(56px + env(safe-area-inset-bottom)) max(16px,env(safe-area-inset-left))}
  ::selection{background:var(--snazzberry);color:#fff}

  .wordmark{
    font-family:'Oswald',sans-serif;
    font-weight:700;
    letter-spacing:0.04em;
    text-transform:uppercase;
    line-height:0.92;
    font-size:clamp(34px,9vw,56px);
    background:linear-gradient(120deg,#c56678 0%, var(--snazzberry-bright) 35%, var(--snazzberry) 70%, #a84456 100%);
    -webkit-background-clip:text;background-clip:text;color:transparent;
    filter:drop-shadow(0 1px 0 rgba(255,255,255,0.08));
  }
  .tagline{
    font-family:'Space Mono',monospace;font-size:12px;letter-spacing:0.18em;
    text-transform:uppercase;color:var(--bone-dim);margin-top:8px;
  }
  header.hero{padding:calc(34px + env(safe-area-inset-top)) 4px 22px}

  .panel{
    background:linear-gradient(180deg,var(--panel) 0%, #1d101a 100%);
    border:1px solid var(--hairline);
    border-radius:16px;padding:18px 16px;
    box-shadow:0 18px 40px -28px rgba(0,0,0,0.9);
  }
  .label{
    font-family:'Oswald',sans-serif;text-transform:uppercase;
    letter-spacing:0.14em;font-size:12px;font-weight:600;color:var(--bone-dim);
    margin:0 0 9px 2px;
  }
  .field{margin-bottom:18px}
  .field:last-child{margin-bottom:0}

  .loc-row{display:flex;gap:8px}
  .loc-input{
    flex:1;min-width:0;background:#100810;border:1px solid var(--hairline);
    color:var(--bone);font-size:16px;font-family:'Inter',sans-serif;
    padding:13px 14px;border-radius:11px;outline:none;
  }
  .loc-input::placeholder{color:#7d6a76}
  .loc-input:focus{border-color:var(--snazzberry-bright);box-shadow:0 0 0 3px rgba(154,51,70,0.25)}
  .locate{
    flex:0 0 auto;background:#100810;border:1px solid var(--hairline);
    color:var(--bone);border-radius:11px;padding:0 14px;cursor:pointer;font-size:18px;
    display:flex;align-items:center;gap:6px;
  }
  .locate:hover{border-color:var(--snazzberry-bright)}
  .locate .lt{font-family:'Space Mono',monospace;font-size:12px;letter-spacing:0.05em}

  .seg{display:flex;flex-wrap:wrap;gap:8px}
  .seg button{
    font-family:'Space Mono',monospace;font-size:14px;
    background:#100810;border:1px solid var(--hairline);color:var(--bone-dim);
    padding:9px 0;border-radius:10px;cursor:pointer;flex:1 1 0;min-width:52px;
    transition:transform .08s ease,border-color .12s ease,color .12s ease;
  }
  .seg button .u{display:block;font-size:9px;letter-spacing:0.12em;color:#7d6a76;margin-top:1px}
  .seg button[aria-pressed="true"]{
    background:linear-gradient(180deg,var(--snazzberry) 0%, var(--snazzberry-deep) 100%);
    border-color:var(--snazzberry-bright);color:#fff;
  }
  .seg button[aria-pressed="true"] .u{color:rgba(255,255,255,0.7)}
  .seg button:active{transform:translateY(1px)}

  .blazes{display:flex;gap:10px}
  .blaze{
    flex:1;display:flex;align-items:center;gap:10px;cursor:pointer;
    background:#100810;border:1px solid var(--hairline);border-radius:12px;
    padding:12px 14px;transition:border-color .12s ease,background .12s ease;
  }
  .blaze .mk{width:18px;height:18px;flex:0 0 auto}
  .blaze .mk.circle{border-radius:50%}
  .blaze .nm{font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:0.06em;font-size:14px}
  .blaze .sub{font-family:'Space Mono',monospace;font-size:10px;color:#7d6a76;letter-spacing:0.04em}
  .blaze[data-on="true"]{background:var(--panel-2);}
  .blaze.green[data-on="true"]{border-color:var(--green-blaze)}
  .blaze.blue[data-on="true"]{border-color:var(--blue-blaze)}
  .blaze[data-on="false"]{opacity:0.45}
  .blaze .txt{display:flex;flex-direction:column;gap:1px}

  .find{
    width:100%;margin-top:20px;cursor:pointer;border:none;border-radius:13px;
    padding:15px;font-family:'Oswald',sans-serif;text-transform:uppercase;
    letter-spacing:0.14em;font-weight:600;font-size:16px;color:#fff;
    background:linear-gradient(110deg,var(--snazzberry-bright),var(--snazzberry) 55%,var(--snazzberry-deep));
    box-shadow:0 12px 26px -12px rgba(154,51,70,0.7);
    transition:transform .08s ease,filter .12s ease;
  }
  .find:hover{filter:brightness(1.08)}
  .find:active{transform:translateY(1px)}
  .find:disabled{opacity:0.55;cursor:default;filter:none}

  .tabs{display:flex;gap:8px;margin:26px 2px 14px}
  .tabs button{
    font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:0.1em;
    font-size:13px;background:none;border:none;color:var(--bone-dim);cursor:pointer;
    padding:6px 2px;position:relative;
  }
  .tabs button[aria-selected="true"]{color:var(--bone)}
  .tabs button[aria-selected="true"]::after{
    content:"";position:absolute;left:0;right:0;bottom:-4px;height:2px;
    background:var(--snazzberry-bright);border-radius:2px;
  }
  .tabs .count{font-family:'Space Mono',monospace;font-size:11px;color:#7d6a76;margin-left:5px}

  .resultline{
    font-family:'Space Mono',monospace;font-size:12px;color:var(--bone-dim);
    letter-spacing:0.04em;margin:0 2px 14px;
  }
  .resultline b{color:var(--snazzberry-bright);font-weight:700}

  .card{
    position:relative;background:linear-gradient(180deg,var(--panel) 0%, #1c0f19 100%);
    border:1px solid var(--hairline);border-radius:14px;overflow:hidden;
    margin-bottom:12px;
  }
  .card .blazeStripe{position:absolute;left:0;top:0;bottom:0;width:6px}
  .card.green .blazeStripe{background:var(--green-blaze)}
  .card.blue .blazeStripe{background:var(--blue-blaze)}
  .card .body{padding:15px 15px 15px 19px;cursor:pointer}
  .card .body:focus{outline:none}
  .card .body:focus-visible{outline:2px solid #9a3346;outline-offset:-2px;border-radius:8px}
  .card .toprow{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
  .card h3{font-family:'Oswald',sans-serif;font-weight:600;font-size:19px;letter-spacing:0.01em;line-height:1.1}
  .difftag{
    flex:0 0 auto;font-family:'Space Mono',monospace;font-size:10px;font-weight:700;
    text-transform:uppercase;letter-spacing:0.06em;padding:4px 8px;border-radius:6px;
    display:flex;align-items:center;gap:6px;white-space:nowrap;
  }
  .difftag .dot{width:10px;height:10px}
  .difftag.circle .dot{border-radius:50%}
  .card.green .difftag{background:rgba(63,161,90,0.16);color:#8fe0a6}
  .card.green .difftag .dot{background:var(--green-blaze)}
  .card.blue .difftag{background:rgba(74,143,212,0.16);color:#a9d0f5}
  .card.blue .difftag .dot{background:var(--blue-blaze)}

  .stats{display:flex;flex-wrap:wrap;gap:6px;margin-top:11px}
  .stat{
    font-family:'Space Mono',monospace;font-size:12px;color:var(--bone);
    background:#160b14;border:1px solid var(--hairline);border-radius:7px;
    padding:5px 9px;display:flex;align-items:center;gap:6px;
  }
  .stat .k{color:#7d6a76;font-size:10px;letter-spacing:0.04em}
  .terrain{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
  .terrain span{
    font-size:11px;color:var(--bone-dim);background:rgba(154,51,70,0.10);
    border:1px solid rgba(154,51,70,0.22);border-radius:20px;padding:3px 10px;
    text-transform:lowercase;letter-spacing:0.02em;
  }
  .blurb{margin-top:11px;font-size:14px;line-height:1.5;color:#e2d3db}
  .chev{font-family:'Space Mono',monospace;font-size:11px;color:#7d6a76;margin-top:10px;letter-spacing:0.06em}

  .detail{border-top:1px solid var(--hairline);padding:14px 15px 16px 19px;animation:open .18s ease}
  @keyframes open{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
  .detail .row{margin-bottom:12px}
  .detail .row:last-of-type{margin-bottom:14px}
  .detail .rk{font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:0.12em;font-size:11px;color:var(--bone-dim);margin-bottom:3px}
  .detail .rv{font-size:14px;line-height:1.5;color:#e6d9e0}
  .permit{display:inline-flex;align-items:center;gap:6px;font-family:'Space Mono',monospace;font-size:12px;padding:4px 9px;border-radius:6px}
  .permit.yes{background:rgba(212,160,74,0.14);color:#e7c585}
  .permit.no{background:rgba(63,161,90,0.14);color:#8fe0a6}
  .actions{display:flex;flex-wrap:wrap;gap:9px;margin-top:4px}
  .actions a,.actions button{
    flex:1 1 calc(50% - 5px);text-align:center;text-decoration:none;cursor:pointer;
    font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:0.08em;
    font-size:13px;font-weight:600;padding:11px;border-radius:10px;border:1px solid var(--hairline);
    display:flex;align-items:center;justify-content:center;gap:7px;background:#160b14;color:var(--bone);
  }
  .actions a.primary{
    flex-basis:100%;background:linear-gradient(110deg,var(--snazzberry-bright),var(--snazzberry-deep));border:none;color:#fff;
  }
  .actions button.saved{border-color:var(--snazzberry-bright);color:var(--snazzberry-bright)}

  .statuspill{display:inline-flex;align-items:center;gap:6px;font-family:'Space Mono',monospace;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;padding:4px 8px;border-radius:6px;white-space:nowrap}
  .statuspill .d{width:8px;height:8px;border-radius:50%;flex:0 0 auto}
  .statuspill.open{background:rgba(63,161,90,0.16);color:#8fe0a6}
  .statuspill.open .d{background:var(--green-blaze)}
  .statuspill.seasonal{background:rgba(212,160,74,0.16);color:#e7c585}
  .statuspill.seasonal .d{background:#d4a04a}
  .statuspill.closed{background:rgba(212,90,90,0.18);color:#f0a8a8}
  .statuspill.closed .d{background:#d45a5a}
  .statuspill.unknown{background:rgba(199,177,181,0.12);color:var(--bone-dim)}
  .statuspill.unknown .d{background:var(--bone-dim)}
  .statuspill.verifying{background:rgba(154,51,70,0.16);color:#e7a3ad}
  .statuspill.verifying .d{background:var(--snazzberry-bright);animation:pulse 1s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  .pillrow{display:flex;align-items:center;gap:7px;margin-top:9px;flex-wrap:wrap}
  .trailphoto{width:100%;border-radius:10px;margin-top:2px;display:block;border:1px solid var(--hairline);max-height:230px;object-fit:cover}
  .photocredit{font-size:10px;color:#7d6a76;margin-top:4px;font-family:'Space Mono',monospace}
  .mapembed{width:100%;height:190px;border:1px solid var(--hairline);border-radius:10px;margin-top:2px;background:#0e0608}
  .srclink{display:inline-flex;align-items:center;gap:6px;font-family:'Space Mono',monospace;font-size:12px;color:var(--snazzberry-bright);text-decoration:none;word-break:break-word}
  .srclink:hover{text-decoration:underline}
  .verifybar{margin-top:11px;background:rgba(212,160,74,0.10);border:1px solid rgba(212,160,74,0.28);border-radius:9px;padding:9px 11px;font-size:12.5px;line-height:1.45;color:#e7c585}
  .hoursline{font-size:14px;line-height:1.5;color:#e6d9e0}
  .hoursline b{color:var(--bone)}

  .cond{display:inline-flex;align-items:center;gap:5px;font-family:'Space Mono',monospace;font-size:11.5px;color:var(--bone-dim)}
  .cond .t{color:var(--bone)}
  .cond.faint{opacity:.55}
  .mudbadge{display:inline-flex;align-items:center;gap:5px;font-family:'Space Mono',monospace;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;padding:3px 8px;border-radius:6px}
  .mudbadge.dry{background:rgba(63,161,90,0.15);color:#8fe0a6}
  .mudbadge.damp{background:rgba(212,160,74,0.14);color:#e7c585}
  .mudbadge.muddy{background:rgba(212,120,60,0.18);color:#f0bd92}
  .mudbadge.impass{background:rgba(212,90,90,0.20);color:#f0a8a8}
  .mudbadge.snow{background:rgba(120,160,212,0.18);color:#bcd6f5}
  .condgrid{display:flex;flex-wrap:wrap;gap:7px;margin-top:2px}
  .condcell{font-family:'Space Mono',monospace;font-size:12px;color:var(--bone);background:#160b14;border:1px solid var(--hairline);border-radius:7px;padding:6px 9px}
  .condcell .k{color:#7d6a76;font-size:10px;letter-spacing:.04em;display:block}
  .freshness{font-size:11px;color:#7d6a76;margin-top:6px;font-family:'Space Mono',monospace}
  .coordnote{font-size:11.5px;line-height:1.4;color:#7d6a76;margin-top:6px}
  .coordnote.warn{color:#f0bd92}

  .offlinebar{position:sticky;top:0;z-index:40;margin:0 -2px 14px;background:linear-gradient(180deg,#3a2a10,#2a1d0a);border:1px solid rgba(212,160,74,0.35);border-radius:11px;padding:10px 13px;display:flex;align-items:center;gap:9px;font-size:13px;color:#e7c585}
  .offlinebar .dot{width:8px;height:8px;border-radius:50%;background:#d4a04a;flex:0 0 auto}
  .installhint{margin:14px 2px 0;background:var(--panel);border:1px solid var(--hairline);border-radius:11px;padding:11px 13px;font-size:12.5px;line-height:1.5;color:var(--bone-dim);display:flex;gap:10px;align-items:flex-start}
  .installhint b{color:var(--bone)}
  .installhint .x{margin-left:auto;background:none;border:none;color:#7d6a76;font-size:16px;cursor:pointer;flex:0 0 auto}

  .daylight{margin-top:9px;font-size:12.5px;line-height:1.45;color:#bcd6f5;background:rgba(74,143,212,0.10);border:1px solid rgba(74,143,212,0.26);border-radius:9px;padding:8px 11px}
  .daylight.warn{color:#f0bd92;background:rgba(212,120,60,0.12);border-color:rgba(212,120,60,0.32)}
  .gearlist{list-style:none;margin:2px 0 0;padding:0;display:flex;flex-direction:column;gap:7px}
  .gearlist li{font-size:13.5px;line-height:1.45;color:#e2d3db;padding-left:16px;position:relative}
  .gearlist li::before{content:"▸";position:absolute;left:0;color:var(--snazzberry-bright)}
  .gearlist li b{color:var(--bone)}
  .gpname{font-family:'Inter',sans-serif;text-transform:none;letter-spacing:0;font-size:11px;color:#7d6a76;font-weight:400;margin-left:6px}
  .gpphotos{display:flex;gap:7px;overflow-x:auto;padding-bottom:2px}
  .gpphoto{height:120px;border-radius:9px;border:1px solid var(--hairline);flex:0 0 auto}

  .seprule{height:1px;background:var(--hairline);margin:18px 0 16px}
  .optional{font-family:'Inter',sans-serif;text-transform:none;letter-spacing:0;font-size:10px;color:#7d6a76;background:rgba(199,177,181,0.12);padding:2px 7px;border-radius:20px;margin-left:6px;font-weight:400}
  .vehgrid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:14px}
  .vehgrid label{display:flex;flex-direction:column;gap:5px;font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:0.1em;font-size:10px;color:var(--bone-dim)}
  .vehgrid .loc-input{font-size:15px;padding:10px 12px}
  .photopick{display:flex;align-items:center;justify-content:center;min-height:64px;border:1px dashed var(--hairline);border-radius:11px;cursor:pointer;color:var(--bone-dim);font-size:13px;margin-bottom:14px;overflow:hidden}
  .photopick img{width:100%;max-height:180px;object-fit:cover;border-radius:10px}

  .toast{position:fixed;left:50%;bottom:calc(24px + env(safe-area-inset-bottom));transform:translateX(-50%);z-index:60;background:#2c171c;border:1px solid var(--snazzberry-bright);color:var(--bone);padding:11px 18px;border-radius:30px;font-size:13.5px;box-shadow:0 12px 30px -12px rgba(0,0,0,0.8);animation:fade .15s ease}
  .calib{margin:0 2px 14px;background:rgba(63,161,90,0.10);border:1px solid rgba(63,161,90,0.28);border-radius:11px;padding:11px 13px;font-size:13px;line-height:1.5;color:#8fe0a6}

  .logentry{display:flex;gap:12px;background:linear-gradient(180deg,var(--panel) 0%, #1c0f19 100%);border:1px solid var(--hairline);border-radius:14px;padding:12px;margin-bottom:12px}
  .logphoto{width:88px;height:88px;border-radius:10px;object-fit:cover;flex:0 0 auto;border:1px solid var(--hairline)}
  .logbody{flex:1;min-width:0}
  .logtop{display:flex;align-items:center;justify-content:space-between;gap:8px}
  .logname{font-family:'Oswald',sans-serif;font-size:17px;font-weight:600;line-height:1.1}
  .ratepill{flex:0 0 auto;font-family:'Space Mono',monospace;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.04em;padding:3px 8px;border-radius:6px}
  .ratepill.easy{background:rgba(63,161,90,0.16);color:#8fe0a6}
  .ratepill.right{background:rgba(74,143,212,0.16);color:#a9d0f5}
  .ratepill.tough{background:rgba(212,120,60,0.18);color:#f0bd92}
  .logmeta{font-family:'Space Mono',monospace;font-size:11px;color:#7d6a76;margin-top:4px}
  .lognote{font-size:13.5px;line-height:1.45;color:#e2d3db;margin-top:7px}
  .logdel{margin-top:8px;background:none;border:none;color:#7d6a76;font-size:12px;cursor:pointer;padding:0;text-decoration:underline}


  .state{text-align:center;padding:46px 20px;color:var(--bone-dim)}
  .state .big{font-family:'Oswald',sans-serif;font-size:20px;text-transform:uppercase;letter-spacing:0.08em;color:var(--bone);margin-bottom:8px}
  .state p{font-size:14px;line-height:1.55;max-width:340px;margin:0 auto}
  .spinner{
    width:38px;height:38px;border-radius:50%;margin:0 auto 18px;
    border:3px solid rgba(154,51,70,0.25);border-top-color:var(--snazzberry-bright);
    animation:spin 0.9s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg)}}
  .errbox{background:rgba(154,51,70,0.10);border:1px solid rgba(154,51,70,0.3);border-radius:12px;padding:16px;margin-top:14px}
  .errbox .big{color:#e7a3ad}
  .retry{margin-top:12px;background:none;border:1px solid var(--snazzberry-bright);color:var(--snazzberry-bright);
    font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:0.08em;font-size:13px;
    padding:9px 18px;border-radius:9px;cursor:pointer}

  .footnote{text-align:center;font-size:12px;color:#6f5d68;line-height:1.6;margin-top:30px;padding:0 10px}
  .footnote b{color:var(--bone-dim);font-weight:600}

  header.hero{position:relative}
  .gear{
    position:absolute;top:calc(env(safe-area-inset-top) + 18px);right:4px;
    background:#100810;border:1px solid var(--hairline);color:var(--bone-dim);
    width:40px;height:40px;border-radius:11px;cursor:pointer;font-size:18px;
    display:flex;align-items:center;justify-content:center;transition:border-color .12s ease,color .12s ease;
  }
